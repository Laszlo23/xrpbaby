# Deploy the GHCR image to Google Cloud Run (optional).
# Repository secrets (Settings → Secrets → Actions):
#   GCP_SA_KEY        — JSON key for a service account with run.admin + artifact permissions (or use WIF)
#   GCP_PROJECT_ID    — GCP project id
#   GCP_REGION        — e.g. europe-west1
#   CLOUD_RUN_SERVICE — Cloud Run service name (created on first deploy if missing)
# Ensure the service account can pull from ghcr.io (public package, or configure pull secret).
name: Deploy Cloud Run

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag on GHCR (default latest)"
        required: false
        default: "latest"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Image reference
        id: img
        run: |
          owner_lc=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "ref=ghcr.io/${owner_lc}/ogchain-web:${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${{ secrets.CLOUD_RUN_SERVICE }}" \
            --image "${{ steps.img.outputs.ref }}" \
            --region "${{ secrets.GCP_REGION }}" \
            --platform managed \
            --allow-unauthenticated \
            --project "${{ secrets.GCP_PROJECT_ID }}"
