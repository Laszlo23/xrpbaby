# Build Next.js standalone image and push to GitHub Container Registry.
# Pull on a host with: docker pull ghcr.io/<owner>/ogchain-web:latest
# Cloud Run: use deploy-cloud-run.yml after setting repository secrets (see workflow file).
name: Docker publish

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/docker-publish.yml"
  workflow_dispatch:

env:
  IMAGE_NAME: ogchain-web

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Image name (GHCR requires lowercase)
        id: meta
        run: |
          owner_lc=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/${owner_lc}/${{ env.IMAGE_NAME }}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: web/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID=${{ secrets.NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
