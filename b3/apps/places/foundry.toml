[profile.default]
# Load `.env` from repo root so `forge script` sees PRIVATE_KEY, PROPERTY_REGISTRY, etc.
dotenv = true
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
via_ir = true

remappings = ["@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/"]
