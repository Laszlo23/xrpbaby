# Reference only — merge into your real server block for 0x.buildingculture.capital
# TanStack app binds HOST port APP_PORT (default 3010) → container :3000.
# Nginx must proxy to that HOST port, not 3000, unless you changed APP_PORT.

upstream buildingculture_app {
    server 127.0.0.1:3010;
    keepalive 32;
}

server {
    listen 443 ssl http2;
    server_name 0x.buildingculture.capital;

    # ssl_certificate /etc/letsencrypt/live/0x.buildingculture.capital/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/0x.buildingculture.capital/privkey.pem;

    location / {
        proxy_pass http://buildingculture_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
