# Reference — static SPA for home.buildingculture.capital (Vite umbrella build → try_files).
# Deploy dist to e.g. /var/www/home-buildingculture and point root there.

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name home.buildingculture.capital;

    # ssl_certificate /etc/letsencrypt/live/home.buildingculture.capital/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/home.buildingculture.capital/privkey.pem;

    root /var/www/home-buildingculture;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
