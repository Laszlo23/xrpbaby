# Example: single host app.buildingcultureid.space
# Unified TanStack app — landing at /, platform routes on same upstream

upstream bc_platform {
    server 127.0.0.1:3000;
}

upstream bc_strapi {
    server 127.0.0.1:1337;
}

# Optional: dedicated API host (recommended for Strapi CORS)
# server {
#     listen 443 ssl http2;
#     server_name api.buildingcultureid.space;
#     location / {
#         proxy_pass http://bc_strapi;
#         proxy_http_version 1.1;
#         proxy_set_header Host $host;
#         proxy_set_header X-Forwarded-Proto $scheme;
#     }
# }

server {
    listen 443 ssl http2;
    server_name app.buildingcultureid.space;

    # ssl_certificate ...

    location / {
        proxy_pass http://bc_platform;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

