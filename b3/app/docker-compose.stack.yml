# Production stack: Postgres + BUILDCHAIN web app (TanStack Start SSR).
# Usage on server (from b3/frontend with .env configured):
#   ./scripts/docker-build.sh
#   docker compose -f docker-compose.stack.yml up -d
#
# Required in .env: POSTGRES_PASSWORD (and usual VITE_* / secrets).
# DATABASE_URL is injected below — do not set a conflicting DATABASE_URL for compose runs.

name: buildingculture

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-buildingculture}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-buildingculture}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-55432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      # Match POSTGRES_USER / POSTGRES_DB defaults above (or adjust both).
      test: ["CMD-SHELL", "pg_isready -U buildingculture -d buildingculture"]
      interval: 4s
      timeout: 5s
      retries: 15
      start_period: 10s
    networks:
      - stack

  web:
    image: ${IMAGE_NAME:-buildingculture-frontend:latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    # Override image entrypoint so a transient DB hiccup doesn't crash-loop the web container.
    # Migrations can still be run manually on the server when needed.
    entrypoint: ["node", "scripts/serve-production.mjs"]
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: postgresql://${POSTGRES_USER:-buildingculture}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-buildingculture}
    ports:
      - "127.0.0.1:${APP_PORT:-3010}:3000"
    networks:
      - stack

networks:
  stack:

volumes:
  pgdata:
