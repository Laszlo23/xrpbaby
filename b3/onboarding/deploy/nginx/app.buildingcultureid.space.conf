# HTTP — ACME + redirect
server {
    listen 80;
    listen [::]:80;
    server_name app.buildingcultureid.space;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — static site + API
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.buildingcultureid.space;

    ssl_certificate /etc/letsencrypt/live/app.buildingcultureid.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.buildingcultureid.space/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10m;
    root /var/www/app-buildingcultureid;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:8020/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
